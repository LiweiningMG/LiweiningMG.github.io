<!-- start custom footer snippets -->
{% if page.lang == 'en' %}
<div class="site-visit-stats" data-site-visit-endpoint="https://comments.liweining.cn/api/site-visits">
  <span>Visitors today: <strong data-site-visit-today>--</strong></span>
  <span aria-hidden="true"> | </span>
  <span>Total visitors: <strong data-site-visit-total>--</strong></span>
</div>
<div class="site-policy-links">
  <a href="/en/privacy/">Privacy notice</a>
</div>
{% else %}
<div class="site-visit-stats" data-site-visit-endpoint="https://comments.liweining.cn/api/site-visits">
  <span>今日访问人数：<strong data-site-visit-today>--</strong></span>
  <span aria-hidden="true"> | </span>
  <span>历史访问人数：<strong data-site-visit-total>--</strong></span>
</div>
<div class="site-policy-links">
  <a href="/privacy/">隐私说明</a>
</div>
{% endif %}
<!-- end custom footer snippets -->
