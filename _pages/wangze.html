    const burnEndpoint = 'https://comments.liweining.cn/api/wangze-letter';
    const isLocalPreview = window.location.protocol === 'file:';
    const gate = document.getElementById('gate'), burned = document.getElementById('burned'), letter = document.getElementById('letter'), error = document.getElementById('error'), answer = document.getElementById('answer'), unlock = document.getElementById('unlock'), content = document.getElementById('letter-content'), secondAnswer = document.getElementById('second-answer'), confirmBurn = document.getElementById('confirm-burn'), burnError = document.getElementById('burn-error');
    function base64ToBytes(value) { const binary = atob(value); const bytes = new Uint8Array(binary.length); for (let index = 0; index < binary.length; index += 1) bytes[index] = binary.charCodeAt(index); return bytes; }
    async function sha256Hex(value) { const data = new TextEncoder().encode(value); const digest = await crypto.subtle.digest('SHA-256', data); return Array.from(new Uint8Array(digest)).map((byte) => byte.toString(16).padStart(2, '0')).join(''); }
    async function decryptLetter(password) { const saltBytes = base64ToBytes(encryptedLetter.salt); const ivBytes = base64ToBytes(encryptedLetter.iv); const dataBytes = base64ToBytes(encryptedLetter.data); const keyMaterial = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']); const key = await crypto.subtle.deriveKey({ name: 'PBKDF2', salt: saltBytes, iterations: encryptedLetter.iterations, hash: 'SHA-256' }, keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['decrypt']); const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: ivBytes }, key, dataBytes); return new TextDecoder().decode(plain); }
    function showBurned() { gate.style.display = 'none'; letter.classList.remove('is-visible'); burned.classList.add('is-visible'); }
    async function callBurnApi(action) { if (isLocalPreview) return { consumed: false, allowed: true, preview: true }; const response = await fetch(burnEndpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ page: 'wangze', action }) }); if (!response.ok) throw new Error('burn api failed'); return response.json(); }
    async function checkBurnState() { try { const state = await callBurnApi('status'); if (state.consumed) showBurned(); } catch (event) { error.textContent = '暂时无法确认这封信的阅读状态，请稍后再试。'; unlock.disabled = true; } }
    async function openLetter() { error.textContent = ''; unlock.disabled = true; unlock.textContent = '正在打开...'; try { const html = await decryptLetter(answer.value.trim()); const burnState = await callBurnApi('consume'); if (burnState.consumed && !burnState.allowed) { showBurned(); return; } content.innerHTML = html; gate.style.display = 'none'; burned.classList.remove('is-visible'); letter.classList.add('is-visible'); } catch (event) { error.textContent = '答案不对，或者这封信没有被正确打开。'; } finally { unlock.disabled = false; unlock.textContent = '打开信封'; } }
    async function confirmBurnedState() { burnError.textContent = ''; const hash = await sha256Hex(secondAnswer.value.trim()); burnError.textContent = hash === encryptedLetter.secondHash ? '已确认。这封信在当前浏览器中不会再次展开。' : '答案不对。'; }
    checkBurnState();
    unlock.addEventListener('click', openLetter); answer.addEventListener('keydown', (event) => { if (event.key === 'Enter') openLetter(); }); confirmBurn.addEventListener('click', confirmBurnedState); secondAnswer.addEventListener('keydown', (event) => { if (event.key === 'Enter') confirmBurnedState(); });
